version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: admissions_flow_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admissions_flow
    ports:
      - '5432:5432'
    volumes:
      - admissions_flow_pg_data:/var/lib/postgresql/data

volumes:
  admissions_flow_pg_data:
